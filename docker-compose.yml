version: "3.9"

services:
  backend:
    build: ./backend
    container_name: streamasst-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - ALLOWED_ORIGINS=*
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: streamasst-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
